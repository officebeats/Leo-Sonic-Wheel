<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>Shadow's Hamster Wheel — Endless Run</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Press+Start+2P&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;touch-action:none;-webkit-user-select:none;user-select:none}
    body{background:#020208;display:flex;align-items:center;justify-content:center;height:100dvh;overflow:hidden;font-family:'Outfit',sans-serif;color:#fff}
    canvas{background:#0a0a0d;image-rendering:pixelated;width:100%;height:100%;object-fit:contain}
    #ui-hud{position:fixed;inset:0;padding:clamp(16px, 4vw, 40px);pointer-events:none;z-index:100;display:flex;flex-direction:column;justify-content:space-between}
    .hud-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
    .gc{background:rgba(255,255,255,0.015);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-left:3px solid #ff3030;padding:12px 20px;display:flex;flex-direction:column;gap:1px;box-shadow:0 10px 30px rgba(0,0,0,0.5);border-radius:0 4px 4px 0}
    .sl{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:0.3em;color:rgba(255,255,255,0.4)}
    .sv{font-family:'Press Start 2P',cursive;font-size:min(18px, 4vw);color:#fff;transition:transform 0.15s cubic-bezier(0.18, 0.89, 0.32, 1.28);transform-origin:left center}
    #title-brand{font-weight:900;font-size:12px;letter-spacing:0.8em;color:rgba(255,255,255,0.1);text-transform:uppercase;position:fixed;top:40px;left:50%;transform:translateX(-50%);z-index:90}
    #game-over,#start-scr{position:fixed;inset:0;background:rgba(0,0,0,0.92);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:20px;text-align:center}
    #game-over.show,#start-scr.show{display:flex;animation:fi 0.6s cubic-bezier(0.23, 1, 0.32, 1)}
    @keyframes fi{from{opacity:0;transform:scale(1.05)}to{opacity:1;transform:scale(1)}}
    .at{font-family:'Press Start 2P',cursive;font-size:clamp(24px, 8vw, 42px);color:#ff3030;text-shadow:4px 4px 0 rgba(255,48,48,0.2)}
    .st{font-family:'Press Start 2P',cursive;font-size:clamp(10px, 3vw, 14px);color:rgba(255,255,255,0.6);letter-spacing:0.1em}
    .ht{font-size:13px;font-weight:700;letter-spacing:0.4em;color:rgba(255,255,255,0.5);text-transform:uppercase;animation:pu 2s infinite;margin-top:20px}
    @keyframes pu{0%,100%{opacity:0.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-5px)}}
    #touch-zone{position:fixed;inset:0;z-index:200}
    .mobile-controls{position:fixed;bottom:30px;right:30px;width:80px;height:80px;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.2);border-radius:50%;display:none;align-items:center;justify-content:center;pointer-events:none;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);z-index:150}
    .mobile-controls::after{content:'JUMP';font-size:10px;font-weight:900;letter-spacing:2px;color:rgba(255,255,255,0.5)}
    @media(max-width:768px){.mobile-controls{display:flex}#title-brand{display:none}.hud-top{padding-top:10px}.gc{padding:8px 12px}}
  </style>
</head>
<body>
  <div id="title-brand">SHADOW ENGINE v2.0</div>
  <div id="ui-hud">
    <div class="hud-top">
      <div class="gc"><span class="sl">DIST</span><span class="sv" id="hDist">0M</span></div>
      <div class="gc" style="border-left-color:#FFD700"><span class="sl">RNGS</span><span class="sv" id="hRing">000</span></div>
      <div class="gc" style="border-left-color:#60aaff"><span class="sl">SPD</span><span class="sv" id="hSpd">0</span></div>
      <div class="gc" id="combo-box" style="border-left-color:#ff00ff;display:none"><span class="sl">COMBO</span><span class="sv" id="hCombo">x1</span></div>
    </div>
  </div>
  <div id="game-over">
    <div class="at">SIGNAL LOST</div>
    <div class="st" id="goDist">0M</div>
    <div class="ht">TAP TO RESTART</div>
  </div>
  <div id="start-scr" class="show">
    <div class="at" style="color:#fff;text-shadow:4px 4px 0 #cc2222">SHADOW RUN</div>
    <div class="st">HAMSTER WHEEL EDITION</div>
    <div class="ht">TAP TO START</div>
  </div>
  <div class="mobile-controls"></div>
  <canvas id="game"></canvas>
  <div id="touch-zone"></div>

// State
let fc=0,scX=0,spd=0,dist=0,dead=false,shk=0,rngs=0;
let wA=0; // wheel angle
let wY=0,wVY=0,onGnd=false; // wheel physics
let sY=0,sVY=0,inWheel=true; // Shadow physics
let runFr=0; // run animation frame
const WX=180; // wheel screen X (fixed)

// --- AUDIO SYSTEM (Web Audio API) ---
const AC = new (window.AudioContext || window.webkitAudioContext)();
function playProceduralSound(type) {
  if (AC.state === 'suspended') AC.resume();
  const osc = AC.createOscillator();
  const gn = AC.createGain();
  osc.connect(gn);
  gn.connect(AC.destination);

  const t = AC.currentTime;
  if (type === 'jump') {
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(150, t);
    osc.frequency.exponentialRampToValueAtTime(600, t + 0.1);
    gn.gain.setValueAtTime(0.3, t);
    gn.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
    osc.start(); osc.stop(t + 0.2);
  } else if (type === 'land') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(100, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.1);
    gn.gain.setValueAtTime(0.5, t);
    gn.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
    osc.start(); osc.stop(t + 0.15);
  } else if (type === 'ring') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, t);
    osc.frequency.exponentialRampToValueAtTime(1200, t + 0.05);
    gn.gain.setValueAtTime(0.2, t);
    gn.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
    osc.start(); osc.stop(t + 0.3);
  } else if (type === 'death') {
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, t);
    osc.frequency.linearRampToValueAtTime(50, t + 0.5);
    gn.gain.setValueAtTime(0.4, t);
    gn.gain.linearRampToValueAtTime(0.01, t + 0.5);
    osc.start(); osc.stop(t + 0.5);
  }
}

let blds=[],pts=[],rOs=[],bgM=[],bgF=[],mls=[],wTrl=[];
let bestDist=localStorage.getItem('ls_best')||0;
let st=0; // 0=start, 1=play, 2=dead
let dtX=0,dtY=0,dtVY=0,dtVX=0,dtR=0; // death tumble vars
let sqT=0; // squash stretch timer

// No hardcoded frame arrays needed, using xF results.

function init(nState=0){
  fc=0;scX=0;spd=4.3;dist=0;shk=0;rngs=0;wA=0;wY=0;wVY=0;onGnd=false;
  sY=0;sVY=0;inWheel=true;runFr=0;sqT=0;st=nState;
  blds=[{x:-200,w:W*2.5,y:H-110,a:[]}];
  pts=[];rOs=[];bgM=[];bgF=[];mls=[];wTrl=[];
  for(let i=0;i<14;i++)bgM.push(mkBg(i*150,0.35,30));
  for(let i=0;i<20;i++)bgF.push(mkBg(i*100,0.12,12));
  document.getElementById('game-over').classList.remove('show');
  if(st===0) document.getElementById('start-scr').classList.add('show');
  else document.getElementById('start-scr').classList.remove('show');
}
function mkBg(lx,z,s){return{x:lx+Math.random()*80,w:90+Math.random()*240,y:H-200-Math.random()*320,s:s+Math.random()*18,z}}

function jump(){
  if(st===0) { init(1); return; }
  if(st===2 && dtY > H+100) { init(1); return; }
  if(st!==1) return;
  if(inWheel && onGnd){
    wVY=-7.2-(spd*0.045); 
    sVY=-10.2-(spd*0.1); 
    inWheel=false; onGnd=false;
    playProceduralSound('jump');
    shk=2;burst(WX,wY+WR,10,'#fff','#bbb');
  }
}

// Input
window.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){e.preventDefault();jump()}});
document.getElementById('touch-zone').addEventListener('pointerdown',e=>{e.preventDefault();jump()});

// Sonic ring sound via Web Audio API
const aCtx=new (window.AudioContext||window.webkitAudioContext)();
function playRing(){
  const t=aCtx.currentTime;
  const o1=aCtx.createOscillator(),o2=aCtx.createOscillator();
  const g=aCtx.createGain();
  o1.type='sine';o1.frequency.setValueAtTime(1568,t);o1.frequency.exponentialRampToValueAtTime(3136,t+0.06);
  o2.type='sine';o2.frequency.setValueAtTime(2637,t+0.06);o2.frequency.exponentialRampToValueAtTime(3951,t+0.12);
  g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
  o1.connect(g);o2.connect(g);g.connect(aCtx.destination);
  o1.start(t);o1.stop(t+0.08);o2.start(t+0.06);o2.stop(t+0.25);
}

function burst(x,y,n,c1,c2){for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2;pts.push({x,y,vx:Math.cos(a)*(1.5+Math.random()*3),vy:Math.sin(a)*(1.5+Math.random()*3),l:1,d:0.035+Math.random()*0.02,c:Math.random()<.5?c1:c2})}}

function update(){
  if(st===0){
    // simple passive scrolling for start screen
    scX+=2;
    // gen basic BGs so screen isn't empty
    const lm=bgM[bgM.length-1];if(lm.x-(scX*lm.z)<W)bgM.push(mkBg(lm.x+80+Math.random()*120,0.35,30));
    const lf=bgF[bgF.length-1];if(lf.x-(scX*lf.z)<W)bgF.push(mkBg(lf.x+60+Math.random()*90,0.12,12));
    return;
  }
  if(st===2){
    if(shk>0)shk*=0.82;
    dtVY+=G*0.9;
    dtX+=dtVX; dtY+=dtVY; dtR+=0.15;
    if(dtY>H+120 && !document.getElementById('game-over').classList.contains('show')){
      document.getElementById('game-over').classList.add('show');
      document.getElementById('goDist').textContent=Math.floor(dist)+'M';
      if(dist>bestDist){ bestDist=Math.floor(dist); localStorage.setItem('ls_best',bestDist); }
    }
    for(let i=pts.length-1;i>=0;i--){const p=pts[i];p.x+=p.vx;p.y+=p.vy;p.l-=p.d;if(p.l<=0)pts.splice(i,1)}
    return;
  }

  // Play state
  fc++;
  if(shk>0)shk*=0.82;

  // Accelerate
  spd+=0.0012;if(spd>15)spd=15;
  scX+=spd*2.8;
  dist+=spd*0.014;

  // Gen buildings
  const lb=blds[blds.length-1];
  if(lb.x+lb.w-scX<W+600){
    const gap=80+Math.random()*(50+spd*4);
    const bw=400+Math.random()*900;
    let by=lb.y+(Math.random()-0.5)*(60+spd*2);
    by=Math.max(H-380,Math.min(H-70,by));
    let ants=[];
    if(Math.random()>.4)for(let k=0;k<3;k++)if(Math.random()>.5)ants.push({x:Math.random()*bw,h:30+Math.random()*60});
    blds.push({x:lb.x+lb.w+gap,w:bw,y:by,a:ants});
    // Rings in gap arc
    const gx=lb.x+lb.w+gap*0.5;
    for(let j=0;j<5;j++){
      const t=j/4;
      rOs.push({x:gx+(j-2)*32,y:Math.min(lb.y,by)-50-Math.sin(t*Math.PI)*90,col:false,b:Math.random()*6.28});
    }
  }

  // Gen BG
  const lm=bgM[bgM.length-1];if(lm.x-(scX*lm.z)<W)bgM.push(mkBg(lm.x+80+Math.random()*120,0.35,30));
  const lf=bgF[bgF.length-1];if(lf.x-(scX*lf.z)<W)bgF.push(mkBg(lf.x+60+Math.random()*90,0.12,12));
  // Cleanup
  while(blds.length>1&&blds[0].x+blds[0].w-scX<-500)blds.shift();
  while(bgM.length>1&&bgM[0].x+bgM[0].w-(scX*bgM[0].z)<-500)bgM.shift();
  while(bgF.length>1&&bgF[0].x+bgF[0].w-(scX*bgF[0].z)<-500)bgF.shift();

  // Physics: wheel as rigid body (DKC mine cart style)
  // Find building under wheel
  const wWX=WX+scX; // wheel world X
  let floorY=null;
  for(const b of blds){
    if(wWX+WR*0.6>=b.x&&wWX-WR*0.6<=b.x+b.w){
      floorY=b.y;break;
    }
  }

  // Gravity always configures wheel
  wVY+=G;
  wY+=wVY;

  onGnd=false;

  if(floorY!==null){
    const wheelBottom=wY+WR;
    // Landing: wheel bottom hits floor while moving down
    if(wVY>=0&&wheelBottom>=floorY&&wheelBottom-wVY<=floorY+18){
      wY=floorY-WR;
      if(wVY>4){
        sqT=Math.min(5,wVY);
        shk=Math.min(12,wVY*0.8);
        playProceduralSound('land');
        if(inWheel)burst(WX,floorY,8,'#888','#555');
      } 
      wVY=0;
      onGnd=true;
    }
    // Already on ground (snap)
    else if(wVY>=0&&Math.abs(wheelBottom-floorY)<3){
      wY=floorY-WR;wVY=0;onGnd=true;
    }
  }

  // Shadow Physics Separate
  if(!inWheel){
    sVY+=G;
    sY+=sVY;
    // Shadow catches back to wheel
    if(sVY>=0 && sY>=wY){
      sY=wY; sVY=wVY; inWheel=true;
      if(onGnd && sVY>4){
        sqT=Math.min(7,sqT+4);shk=Math.max(shk,4);
        playProceduralSound('land');
        burst(WX,wY+WR,8,'#fff','#ccc');
      }
    }
  } else {
    sY=wY;
    sVY=wVY;
  }

  // Wall collision: check if wheel hits the LEFT edge of a building it's not on top of
  for(const b of blds){
    const bx=b.x-scX;
    // If building left edge is near wheel right side AND wheel is below roof
    if(bx>WX-WR*0.5&&bx<WX+WR*0.8&&wY+WR>b.y+8){
      die();return;
    }
  }

  // Fell off screen
  if(wY>H+80){die();return}

  // Wheel rotation synced to speed
  wA+=spd*0.045;

  // Run animation
  runFr+=spd*0.06;

  // Ring collection
  rOs.forEach(r=>{
    if(r.col)return;
    const rx=r.x-scX,ry=r.y+Math.sin(fc*0.05+r.b)*5;
    // Check collision with Shadow (sY), not just wheel
    const dx=rx-WX,dy=ry-(inWheel?wY:sY);
    if(Math.sqrt(dx*dx+dy*dy)<WR+12){
      r.col=true;rngs++;burst(rx,ry,8,'#FFD700','#ffe066');playRing();
      const rE=document.getElementById('hRing');rE.style.transform='scale(1.4)';setTimeout(()=>rE.style.transform='scale(1)',150);
    }
  });

  // Dust particles when grounded
  if(onGnd&&spd>3&&fc%3===0){
    pts.push({x:WX-WR+Math.random()*8,y:wY+WR,vx:-1-Math.random()*3,vy:-Math.random()*2.5,l:1,d:0.035,c:'rgba(200,200,200,0.5)'});
  }
  // Speed lines at high speed
  if(spd>14&&fc%2===0){
    const ly=Math.random()*H*0.7;
    pts.push({x:W+10,y:ly,vx:-(spd*4+Math.random()*20),vy:0,l:0.6,d:0.06,c:'rgba(255,255,255,0.08)'});
  }
  
  // Wheel afterimage trail
  if(spd>15&&fc%3===0){
    wTrl.push({x:WX,y:wY,a:wA,l:1});
  }
  for(let i=wTrl.length-1;i>=0;i--){
    wTrl[i].x-=spd*2.8;wTrl[i].l-=0.06;
    if(wTrl[i].l<=0)wTrl.splice(i,1);
  }

  // Particles update
  for(let i=pts.length-1;i>=0;i--){const p=pts[i];p.x+=p.vx;p.y+=p.vy;p.l-=p.d;if(p.l<=0)pts.splice(i,1)}

  // HUD
  const dI=Math.floor(dist);
  document.getElementById('hDist').textContent=dI+'M';
  document.getElementById('hRing').textContent=rngs.toString().padStart(3,'0');
  document.getElementById('hSpd').textContent=(spd*10).toFixed(0);
  
  if(sqT>0)sqT*=0.8;
  
  // Milestone
  if(dI>0 && dI%100===0 && !mls.includes(dI)){
    mls.push(dI);
    pts.push({txt:dI+'M!',x:W/2,y:H/2,l:1,d:0.015,c:'#FFD700'});
  }
}

function die(){
  if(st===2) return;
  st=2;shk=26;
  playProceduralSound('death');
  dtX=WX; dtY=wY; dtVX=spd*0.8; dtVY=-12; dtR=0;
  for(let i=0;i<15;i++) burst(WX,wY+WR,15,'#fff','#ccc'); // death explosion
}

function render(){
  cx.save();
  if(shk>0)cx.translate((Math.random()-.5)*shk,(Math.random()-.5)*shk);

  // Sky gradient
  const sg=cx.createLinearGradient(0,0,0,H);
  sg.addColorStop(0,'#0a0c24');sg.addColorStop(0.6,'#161038');sg.addColorStop(1,'#221848');
  cx.fillStyle=sg;cx.fillRect(0,0,W,H);

  // Avant-Garde Moon
  cx.strokeStyle='rgba(255,255,255,0.04)';
  cx.lineWidth=1;
  cx.beginPath();cx.arc(W*0.75, H*0.3, 80, 0, Math.PI*2);cx.stroke();
  cx.beginPath();cx.arc(W*0.75, H*0.3, 140, 0, Math.PI*2);cx.stroke();
  cx.strokeStyle='rgba(255,48,48,0.1)';
  cx.beginPath();cx.arc(W*0.75, H*0.3, 130, 0, Math.PI*2);cx.stroke();

  // Stars
  cx.fillStyle='#fff';
  for(let i=0;i<70;i++){
    const sx=((i*137+50)%W+fc*0.025*((i%3)+1))%W,sy=(i*73+20)%(H*0.45);
    cx.globalAlpha=0.15+0.2*Math.sin(fc*0.02+i);
    cx.fillRect(sx,sy,1,1);
  }
  cx.globalAlpha=1;

  // Far BG buildings
  bgF.forEach(b=>{const bx=b.x-scX*b.z;cx.fillStyle=`rgb(${b.s|0},${b.s|0},${(b.s+4)|0})`;cx.fillRect(bx,b.y,b.w,H-b.y)});

  // Mid BG buildings + windows
  bgM.forEach(b=>{
    const bx=b.x-scX*b.z;
    cx.fillStyle=`rgb(${b.s|0},${b.s|0},${(b.s+4)|0})`;cx.fillRect(bx,b.y,b.w,H-b.y);
    cx.fillStyle='rgba(255,255,255,0.02)';
    for(let wx=12;wx<b.w-12;wx+=28)for(let wy=20;wy<H-b.y-12;wy+=40){if((wx+wy|0)%5===0)cx.fillRect(bx+wx,b.y+wy,7,13)}
  });

  // FG Buildings (rooftops)
  blds.forEach(b=>{
    const bx=b.x-scX;
    // Antennas
    cx.fillStyle='#060606';
    if(b.a)b.a.forEach(an=>cx.fillRect(bx+an.x,b.y-an.h,2,an.h));
    
    // Building body
    cx.fillStyle='#040404';cx.fillRect(bx,b.y+3,b.w,H-b.y);
    // Roof line — stark white
    cx.fillStyle='#e8e8e8';cx.fillRect(bx,b.y,b.w,3);
    // Facade depth gradient
    const fg=cx.createLinearGradient(0,b.y,0,H);fg.addColorStop(0,'rgba(18,18,22,0.9)');fg.addColorStop(1,'#000');
    cx.fillStyle=fg;cx.fillRect(bx,b.y+3,b.w,H-b.y-3);
    // Structural lines
    cx.fillStyle='rgba(255,255,255,0.02)';
    for(let x=30;x<b.w;x+=65)cx.fillRect(bx+x,b.y+3,2,H-b.y);
  });

  // Rings
  rOs.forEach(r=>{
    if(r.col)return;
    const rx=r.x-scX,ry=r.y+Math.sin(fc*0.05+r.b)*5;
    if(rx<-30||rx>W+30)return;
    cx.fillStyle='rgba(255,215,0,0.08)';cx.beginPath();cx.arc(rx,ry,14,0,Math.PI*2);cx.fill();
    cx.strokeStyle='#FFD700';cx.lineWidth=2.5;cx.beginPath();cx.ellipse(rx,ry,7,9,0,0,Math.PI*2);cx.stroke();
    cx.strokeStyle='#ffe066';cx.lineWidth=1;cx.beginPath();cx.ellipse(rx,ry,4,6,0,0,Math.PI*2);cx.stroke();
  });

  // Wheel trails (Afterimages)
  wTrl.forEach(t=>{
    cx.save();cx.translate(t.x,t.y);cx.rotate(t.a);
    cx.strokeStyle=`rgba(255,48,48,${t.l*0.4})`;cx.lineWidth=4;cx.beginPath();cx.arc(0,0,WR+4,0,Math.PI*2);cx.stroke();
    cx.restore();
  });

  if(st===1 || st===0){
    // === WHEEL (DKC style separated) ===
    cx.save();
    cx.translate(WX,wY);
    
    // Squash/Stretch effect
    if(sqT>0.1){
      const sq=sqT*0.06;
      cx.translate(0,WR);
      cx.scale(1+sq,1-sq);
      cx.translate(0,-WR);
    }

    // Wheel glow
    const wg=cx.createRadialGradient(0,0,WR-8,0,0,WR+22);
    wg.addColorStop(0,'rgba(180,30,30,0)');wg.addColorStop(1,'rgba(180,30,30,0.05)');
    cx.fillStyle=wg;cx.beginPath();cx.arc(0,0,WR+22,0,Math.PI*2);cx.fill();

    // Outer rim
    cx.strokeStyle='#999';cx.lineWidth=5;cx.beginPath();cx.arc(0,0,WR,0,Math.PI*2);cx.stroke();
    // Inner rim
    cx.strokeStyle='#555';cx.lineWidth=2;cx.beginPath();cx.arc(0,0,WR-10,0,Math.PI*2);cx.stroke();
    // Rungs (between rims)
    cx.strokeStyle='#666';cx.lineWidth=3;
    for(let i=0;i<20;i++){const a=wA+(i/20)*Math.PI*2;cx.beginPath();cx.moveTo(Math.cos(a)*(WR-12),Math.sin(a)*(WR-12));cx.lineTo(Math.cos(a)*(WR-2),Math.sin(a)*(WR-2));cx.stroke()}
    // Spokes
    cx.strokeStyle='#444';cx.lineWidth=1.5;
    for(let i=0;i<8;i++){const a=wA+(i/8)*Math.PI*2;cx.beginPath();cx.moveTo(Math.cos(a)*12,Math.sin(a)*12);cx.lineTo(Math.cos(a)*(WR-12),Math.sin(a)*(WR-12));cx.stroke()}
    // Hub
    cx.fillStyle='#333';cx.beginPath();cx.arc(0,0,10,0,Math.PI*2);cx.fill();
    cx.fillStyle='#cc2222';cx.beginPath();cx.arc(0,0,4.5,0,Math.PI*2);cx.fill();

    cx.restore();

    // === SHADOW ===
    cx.save();
    cx.translate(WX,sY);
    // Squash/Stretch effect on Shadow too
    if(sqT>0.1&&inWheel){
      const sq=sqT*0.06;
      cx.translate(0,WR-10);
      cx.scale(1+sq,1-sq*.5);
      cx.translate(0,-(WR-10));
    }

    if(sL&&rF.length>0){
      const sz=50;
      const footY=WR-12; // bottom of inner rim
      if(inWheel) {
        const f=rF[Math.floor(runFr)%rF.length];
        cx.drawImage(pS,f.x,RR.y,f.w,RR.h,-sz/2,footY-sz,sz,sz);
      } else {
        const f=jF[Math.floor(fc/3)%jF.length];
        cx.drawImage(pS,f.x,RJ.y,f.w,RJ.h,-sz/2,footY-sz-12,sz,sz);
      }
    } else {
      cx.fillStyle='#cc2222';cx.fillRect(-12,WR-12-36,24,36);
    }
    cx.restore();
  } else if (st===2) {
    // TUMBLING DEATH
    cx.save();
    cx.translate(dtX, dtY);
    cx.rotate(dtR*0.5);
    // Draw broken wheel segments
    cx.strokeStyle='#555';cx.lineWidth=5;cx.beginPath();cx.arc(0,0,WR,0,Math.PI);cx.stroke();
    
    // Draw tumbling shadow
    cx.rotate(dtR*1.5);
    if(sL && dF.length>0) {
      const f = dF[Math.min(dF.length-1, 8)]; // Use frame 8/9 area for death
      cx.drawImage(pS, f.x, RD.y, f.w, RD.h, -25, -25, 50, 50);
    }
    cx.restore();
  }

  // Particles/Milestones
  pts.forEach(p=>{
    cx.globalAlpha=p.l;
    if(p.txt){
      cx.font="italic 900 32px 'Outfit'";
      cx.fillStyle=p.c;
      cx.textAlign='center';
      cx.fillText(p.txt, p.x, p.y);
      p.y-=1.5;
    } else {
      cx.fillStyle=p.c;cx.fillRect(p.x,p.y,3,3)
    }
  });
  cx.globalAlpha=1;

  // Vignette
  const v=cx.createRadialGradient(W/2,H/2,W*0.25,W/2,H/2,W*0.95);
  v.addColorStop(0,'transparent');v.addColorStop(1,'rgba(0,0,0,0.75)');
  cx.fillStyle=v;cx.fillRect(0,0,W,H);

  cx.restore();
}

function loop(){update();render();requestAnimationFrame(loop)}
init();loop();
</script>
</body>
